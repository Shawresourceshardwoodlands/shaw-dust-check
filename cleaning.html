<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaw Resources — Daily Cleaning Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.topbar{background:#1A4731;padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{color:#fff;font-size:15px;font-weight:600}
.topbar-sub{color:#9FE1CB;font-size:11px;margin-top:2px}
.topbar-right{color:#9FE1CB;font-size:12px}
.prog-wrap{background:#D6EAD9;height:5px}
.prog-bar{height:5px;background:#2E7D52;transition:width 0.3s}
.screen{padding:16px 14px 0}
.screen-title{font-size:16px;font-weight:600;color:#111;margin-bottom:4px;margin-top:4px}
.screen-sub{font-size:12px;color:#888;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#111;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:#2E7D52}
.task-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:11px 12px;margin-bottom:8px;transition:border-color 0.2s}
.task-card.done{border-color:#2E7D52;background:#f0f7f0}
.task-card.done .task-text{color:#555}
.task-header{display:flex;align-items:flex-start;gap:10px}
.task-check{min-width:32px;height:32px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0}
.task-check.checked{background:#1A4731;border-color:#1A4731;color:#fff}
.task-text{font-size:13px;color:#222;line-height:1.5;flex:1;padding-top:6px}
.task-role{display:inline-block;font-size:10px;color:#888;background:#f0f0f0;padding:1px 6px;border-radius:8px;margin-top:4px}
.task-time{font-size:11px;color:#2E7D52;margin-top:3px}
.task-comment{margin-top:8px;display:none}
.task-card.done .task-comment{display:block}
.task-comment textarea{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;resize:none;min-height:48px;color:#111}
.section-label{font-size:11px;font-weight:600;color:#1A4731;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #D6EAD9}
.nav-row{display:flex;gap:8px;padding:16px 14px 20px}
.nav-btn{flex:1;padding:13px;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;background:#f5f5f5;color:#333;font-weight:400}
.nav-btn.primary{background:#1A4731;border-color:#1A4731;color:#fff;font-weight:600}
.nav-btn:active{opacity:0.85}
.nav-btn:disabled{opacity:0.4;cursor:not-allowed}
.summary-wrap{padding:14px}
.summary-box{background:#f5f5f5;border-radius:10px;padding:14px;margin-bottom:14px}
.summary-title{font-size:13px;font-weight:600;color:#1A4731;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:8px;padding:10px;text-align:center;border:1px solid #eee}
.stat-num{font-size:24px;font-weight:600}
.stat-lbl{font-size:11px;color:#888;margin-top:2px}
.c-ok{color:#1A4731}
.c-notok{color:#A32D2D}
.sup-field{margin-bottom:16px}
.sup-field label{font-size:12px;color:#666;display:block;margin-bottom:5px}
.sup-field textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;resize:none;min-height:72px;color:#111}
.confirm-wrap{padding:20px 14px;text-align:center}
.confirm-icon{font-size:48px;margin-bottom:12px}
.confirm-title{font-size:18px;font-weight:600;color:#1A4731;margin-bottom:6px}
.confirm-sub{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.confirm-btn{width:100%;padding:13px;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;background:#f5f5f5;color:#333;margin-bottom:8px}
.confirm-btn.primary{background:#1A4731;border-color:#1A4731;color:#fff;font-weight:600}
.not-done-list{margin-top:10px}
.not-done-item{font-size:12px;color:#A32D2D;padding:4px 0;border-bottom:1px solid #fee;display:flex;gap:6px}
.not-done-item:before{content:"✗";flex-shrink:0}
.sending{text-align:center;padding:40px 14px;color:#888;font-size:14px}
</style>
</head>

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

const state = {
  screen: 0,
  operator: "",
  day: "",
  shift: "",
  date: new Date().toISOString().split("T")[0],
  tasks: [],
  done: {},
  comments: {},
  supComment: "",
  submitted: false,
};

function getTasks() {
  const specific = (DAY_TASKS[state.day] && DAY_TASKS[state.day][state.shift]) || [];
  return [...specific, ...EVERY_SHIFT];
}

function toggleDone(id) {
  if (state.submitted) return;
  const now = new Date().toLocaleTimeString("en-CA", {hour:"2-digit",minute:"2-digit"});
  if (state.done[id]) {
    delete state.done[id];
  } else {
    state.done[id] = now;
  }
  render();
}

function pct() {
  return Math.round((state.screen / 3) * 100);
}

function countTasks() {
  const tasks = getTasks();
  const total = tasks.length;
  const done = Object.keys(state.done).length;
  return { total, done, notDone: total - done, compliance: total > 0 ? Math.round((done / total) * 100) : 0 };
}

async function submitData() {
  const tasks = getTasks();
  const { compliance } = countTasks();
  state.screen = "sending";
  render();

  try {
    for (const task of tasks) {
      const isDone = !!state.done[task.id];
      const payload = {
        date: state.date,
        day: state.day,
        shift: state.shift === "AM" ? "Day Shift" : "Night Shift",
        operator: state.operator,
        task: task.t,
        status: isDone ? "Done" : "Not Done",
        timestamp: state.done[task.id] || "",
        comment: state.comments[task.id] || "",
        supervisorComment: state.supComment,
        compliance: compliance + "%",
      };
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
    }
  } catch(e) {
    console.log("Submit error:", e);
  }

  state.submitted = true;
  state.screen = "confirm";
  render();
}

function renderLogin() {
  const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
  return `
<div class="topbar"><div><div class="topbar-title">Shaw Resources — SRHWL</div><div class="topbar-sub">Daily Cleaning Schedule · SHAW-CLEAN-D001</div></div></div>
<div class="prog-wrap"><div class="prog-bar" style="width:0%"></div></div>
<div class="screen">
<div class="screen-title">Start of Shift</div>
<div class="screen-sub">Fill in your information to load today's cleaning tasks.</div>
<div class="field"><label>Operator Name</label><input type="text" value="${state.operator}" placeholder="Full name" oninput="state.operator=this.value"></div>
<div class="field"><label>Day</label><select onchange="state.day=this.value">

${DAYS.map(d=>`<option value="${d}"${d===today||state.day===d?" selected":""}>${d}</option>`).join("")}

<option value="PM"${state.shift==="PM"?" selected":""}>Night Shift (PM)</option>

</div>
<div class="nav-row">
<button class="nav-btn primary" onclick="startChecklist()" ${!state.operator||!state.day||!state.shift?"disabled":""}>Load Tasks →</button>
</div>`;
}

function startChecklist() {
  if (!state.operator || !state.day || !state.shift) return;
  state.tasks = getTasks();
  state.screen = 1;
  render();
}

function renderChecklist() {
  const tasks = getTasks();
  const specific = (DAY_TASKS[state.day] && DAY_TASKS[state.day][state.shift]) || [];
  const { total, done } = countTasks();

  const renderTask = (task) => {
    const isDone = !!state.done[task.id];
    return `<div class="task-card${isDone?" done":""}">
<div class="task-header">
<button class="task-check${isDone?" checked":""}" onclick="toggleDone('${task.id}')">${isDone?"✓":""}</button>
<div style="flex:1">
<div class="task-text">${task.t}</div>
<div class="task-role">${task.role}</div>
${isDone?`<div class="task-time">Marked at ${state.done[task.id]}</div>`:""}
</div>
</div>
<div class="task-comment">
<textarea placeholder="Comment (optional)..." oninput="state.comments['${task.id}']=this.value">${state.comments[task.id]||""}</textarea>
</div>
</div>`;
  };

  const specificHtml = specific.length > 0 ? `
<div class="section-label">${state.day} ${state.shift==="AM"?"Day":"Night"} Shift — specific tasks</div>
${specific.map(renderTask).join("")}` : "";

  const everyShiftHtml = `
<div class="section-label">Every Shift — all days</div>
${EVERY_SHIFT.map(renderTask).join("")}`;

  return `
<div class="topbar">
<div><div class="topbar-title">${state.day} — ${state.shift==="AM"?"Day":"Night"} Shift</div>
<div class="topbar-sub">${state.operator} · ${state.date}</div></div>
<div class="topbar-right">${done}/${total} done</div>
</div>
<div class="prog-wrap"><div class="prog-bar" style="width:${pct()}%"></div></div>
<div class="screen">
${specificHtml}
${everyShiftHtml}
</div>
<div class="nav-row">
<button class="nav-btn" onclick="state.screen=0;render()">← Back</button>
<button class="nav-btn primary" onclick="state.screen=2;render()">Review & Submit →</button>
</div>`;
}

function renderSummary() {
  const { total, done, notDone, compliance } = countTasks();
  const tasks = getTasks();
  const notDoneList = tasks.filter(t => !state.done[t.id]);

  const notDoneHtml = notDoneList.length > 0 ? `
<div class="summary-title" style="color:#A32D2D;margin-top:12px">Not done — will be recorded as incomplete</div>
<div class="not-done-list">
${notDoneList.map(t=>`<div class="not-done-item">${t.t}</div>`).join("")}
</div>` : `<div style="color:#1A4731;font-size:13px;margin-top:8px">✓ All tasks completed.</div>`;

  return `
<div class="topbar"><div><div class="topbar-title">Review & Submit</div>
<div class="topbar-sub">${state.day} ${state.shift==="AM"?"Day":"Night"} Shift · ${state.operator}</div></div></div>
<div class="prog-wrap"><div class="prog-bar" style="width:75%"></div></div>
<div class="summary-wrap">
<div class="stats-grid">
<div class="stat"><div class="stat-num c-ok">${done}</div><div class="stat-lbl">Done</div></div>
<div class="stat"><div class="stat-num c-notok">${notDone}</div><div class="stat-lbl">Not done</div></div>
<div class="stat"><div class="stat-num" style="color:#1A4731">${compliance}%</div><div class="stat-lbl">Compliance</div></div>
<div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Total tasks</div></div>
</div>
<div class="summary-box">
${notDoneHtml}
</div>
<div class="sup-field">
<label>Supervisor comment (optional)</label>
<textarea placeholder="Add any notes for the supervisor..." oninput="state.supComment=this.value">${state.supComment}</textarea>
</div>
<p style="font-size:11px;color:#A32D2D;margin-bottom:16px">⚠ Once submitted this record cannot be edited.</p>
</div>
<div class="nav-row">
<button class="nav-btn" onclick="state.screen=1;render()">← Back</button>
<button class="nav-btn primary" onclick="submitData()">Submit & Save →</button>
</div>`;
}

function renderSending() {
  return `
<div class="topbar"><div><div class="topbar-title">Saving...</div></div></div>
<div class="prog-wrap"><div class="prog-bar" style="width:90%"></div></div>
<div class="sending">
<div style="font-size:32px;margin-bottom:12px">⏳</div>
<div>Saving your record to the system...</div>
<div style="font-size:12px;color:#aaa;margin-top:6px">Please wait</div>
</div>`;
}

function renderConfirm() {
  const { done, total, compliance } = countTasks();
  const ts = new Date().toLocaleString("en-CA");
  return `
<div class="topbar"><div><div class="topbar-title">Submitted</div>
<div class="topbar-sub">Record saved successfully</div></div></div>
<div class="prog-wrap"><div class="prog-bar" style="width:100%"></div></div>
<div class="confirm-wrap">
<div class="confirm-icon">✅</div>
<div class="confirm-title">Record saved</div>
<div class="confirm-sub">
${state.operator}<br>
${state.day} — ${state.shift==="AM"?"Day":"Night"} Shift<br>
${state.date} · ${ts}<br><br>
<strong>${done}/${total} tasks done · ${compliance}% compliance</strong>
</div>
<button class="confirm-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
<button class="confirm-btn primary" onclick="newShift()">Start new shift</button>
</div>`;
}

function newShift() {
  state.screen = 0;
  state.operator = "";
  state.day = "";
  state.shift = "";
  state.date = new Date().toISOString().split("T")[0];
  state.done = {};
  state.comments = {};
  state.supComment = "";
  state.submitted = false;
  render();
}

function render() {
  const app = document.getElementById("app");
  if (state.screen === 0) app.innerHTML = renderLogin();
  else if (state.screen === 1) app.innerHTML = renderChecklist();
  else if (state.screen === 2) app.innerHTML = renderSummary();
  else if (state.screen === "sending") app.innerHTML = renderSending();
  else if (state.screen === "confirm") app.innerHTML = renderConfirm();
  window.scrollTo(0, 0);
}

render();
</script>
</body>
</html>
